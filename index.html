<!-- ===== CDN: Tailwind / SweetAlert2 / Chart.js / Leaflet / Fonts / Icons ===== -->
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<script>
  // ปรับธีม Tailwind ให้ตรง Design System
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          primary: '#2563EB', secondary: '#10B981',
          warning: '#F59E0B', danger: '#EF4444',
          bgapp: '#F8FAFC', textmain: '#1F2937'
        },
        fontFamily: { thai: ['Noto Sans Thai', 'sans-serif'] }
      }
    }
  };
</script>

<style>
  /* ===== Global ===== */
  * { font-family: 'Noto Sans Thai', sans-serif; }
  body { background: #F8FAFC; color: #1F2937; -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 6px; }

  /* ===== View transitions ===== */
  .view { display: none; animation: fadeIn .25s ease; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ===== Cards & micro-interactions ===== */
  .card { background: #fff; border-radius: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04); }
  .btn-press { transition: transform .08s ease, box-shadow .15s ease; }
  .btn-press:active { transform: scale(.96); }
  .nav-item.active { color: #2563EB; }
  .nav-item.active i { transform: translateY(-2px); }
  .nav-item i { transition: transform .2s ease; }

  /* ===== Accordion ===== */
  .acc-body { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
  .acc-body.open { max-height: 4000px; }
  .acc-chevron { transition: transform .3s ease; }
  .acc-open .acc-chevron { transform: rotate(180deg); }

  /* ===== Segmented / radio cards ===== */
  .seg label { cursor: pointer; }
  .seg input { display: none; }
  .seg input:checked + span {
    background: #2563EB; color: #fff; border-color: #2563EB;
    box-shadow: 0 2px 6px rgba(37,99,235,.35);
  }
  .seg span {
    display: block; text-align: center; padding: .55rem .4rem; border: 1.5px solid #e2e8f0;
    border-radius: .6rem; font-size: .85rem; transition: all .15s ease; background: #fff;
  }

  /* ===== Skeleton ===== */
  .skeleton { background: linear-gradient(90deg,#eef2f7 25%,#e2e8f0 37%,#eef2f7 63%); background-size: 400% 100%; animation: sk 1.3s ease infinite; border-radius:.5rem; }
  @keyframes sk { 0%{background-position:100% 50%} 100%{background-position:0 50%} }

  /* ===== Risk badges ===== */
  .risk-normal{background:#dcfce7;color:#166534}
  .risk-low{background:#fef9c3;color:#854d0e}
  .risk-moderate{background:#ffedd5;color:#9a3412}
  .risk-high{background:#fee2e2;color:#991b1b}

  /* ===== Map ===== */
  .leaflet-container { border-radius: .75rem; z-index: 0; }

  /* ===== FAB ===== */
  .fab { box-shadow: 0 8px 20px rgba(37,99,235,.45); }

  /* hide number spinners */
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
</style>
</head>

  style="background:linear-gradient(160deg,#2563EB 0%,#1e40af 100%)">
  <div class="w-full max-w-sm">

      <h1 class="text-2xl font-bold">LTC Community Care</h1>

<div id="modal-root"></div>

<script>
/* =====================================================
 * CONFIG  — ตั้งค่า 2 ค่านี้ก่อนใช้งาน
 * ===================================================== */
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwegFGFsmoOYVjXIcAim-Z6A6SL7NH3N0dO4jmsQVQzIY8a4J-FdQGncRCMhD9MUSplNg/exec';
const API_KEY     = 'AIzaSyDI8lRtoQf4UIDp9TNBXzpvY2u-ymffeqc';

/* ===================================================== */
/* STATE                                                 */
/* ===================================================== */
const STATE = {
  token: sessionStorage.getItem('ltc_token') || null,
  user: JSON.parse(sessionStorage.getItem('ltc_user') || 'null'),
  patients: [],
  careGivers: [],
  currentPid: null,
  charts: {},   // เก็บ instance ของ Chart.js เพื่อ destroy ก่อนวาดใหม่
  maps: {}      // เก็บ instance ของ Leaflet
};

/* ===================================================== */
/* FETCH API CLIENT  (ใช้ fetch() เท่านั้น)              */
/* ===================================================== */
async function api(action, data = {}) {
  const payload = { apiKey: API_KEY, token: STATE.token, action, data };
  const res = await fetch(WEB_APP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // เลี่ยง CORS preflight
    body: JSON.stringify(payload)
  });
  const json = await res.json();
  if (!json.success && /เซสชันหมดอายุ|API Key/.test(json.message || '')) {
    if (action !== 'login') { forceLogout(); }
  }
  return json;
}

/* ===================================================== */
/* AUTH                                                  */
/* ===================================================== */
function togglePwd() {
  const i = document.getElementById('login-password');
  const e = document.getElementById('pwd-eye');
  if (i.type === 'password') { i.type = 'text'; e.className = 'fa-solid fa-eye-slash'; }
  else { i.type = 'password'; e.className = 'fa-solid fa-eye'; }
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) { toast('กรุณากรอกข้อมูลให้ครบ', 'warning'); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>กำลังเข้าสู่ระบบ...';
  try {
    const r = await api('login', { username, password });
    if (!r.success) { toast(r.message, 'error'); return; }
    STATE.token = r.data.token; STATE.user = r.data.user;
    sessionStorage.setItem('ltc_token', STATE.token);
    sessionStorage.setItem('ltc_user', JSON.stringify(STATE.user));
    enterApp();
  } catch (e) {
    Swal.fire({ icon: 'error', title: 'เชื่อมต่อไม่สำเร็จ', text: 'ตรวจสอบ WEB_APP_URL และการ Deploy', confirmButtonColor: '#2563EB' });
  } finally {
    btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-right-to-bracket mr-2"></i>เข้าสู่ระบบ';
  }
}

function doLogout() {
  Swal.fire({
    icon: 'question', title: 'ออกจากระบบ?', showCancelButton: true,
    confirmButtonText: 'ออกจากระบบ', cancelButtonText: 'ยกเลิก', confirmButtonColor: '#EF4444'
  }).then(res => { if (res.isConfirmed) forceLogout(); });
}

function forceLogout() {
  api('logout').catch(()=>{});
  STATE.token = null; STATE.user = null;
  sessionStorage.removeItem('ltc_token'); sessionStorage.removeItem('ltc_user');
  document.getElementById('app-shell').classList.add('hidden');
  document.getElementById('view-login').classList.add('active');
}

/* ===================================================== */
/* NAVIGATION  (role-based menu)                         */
/* ===================================================== */
const ROLE_LABEL = { admin: 'ผู้ดูแลระบบ', caregiver: 'Care Giver', case_manager: 'Case Manager' };

const MENU = [
  { id: 'dashboard', label: 'แดชบอร์ด', icon: 'fa-chart-pie', roles: ['admin','caregiver','case_manager'] },
  { id: 'patients',  label: 'รายชื่อเคส', icon: 'fa-users', roles: ['admin','caregiver','case_manager'] },
  { id: 'visit',     label: 'บันทึกเยี่ยม', icon: 'fa-notes-medical', roles: ['admin','caregiver'] }
];

function buildNav() {
  const role = STATE.user.role;
  const items = MENU.filter(m => m.roles.includes(role));
  // sidebar
  document.getElementById('sidebar-nav').innerHTML = items.map(m => `
    <button onclick="navTo('${m.id}')" data-nav="${m.id}"
      class="nav-side w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-blue-50 hover:text-primary font-medium text-sm">
      <i class="fa-solid ${m.icon} w-5 text-center"></i>${m.label}
    </button>`).join('');
  // bottom nav (max 3)
  const bottom = items.slice(0, 3);
  document.getElementById('bottom-nav').className = `grid grid-cols-${bottom.length} h-16`;
  document.getElementById('bottom-nav').innerHTML = bottom.map(m => `
    <button onclick="navTo('${m.id}')" data-bnav="${m.id}"
      class="nav-item flex flex-col items-center justify-center gap-0.5 text-slate-400 text-xs">
      <i class="fa-solid ${m.icon} text-lg"></i><span>${m.label}</span>
    </button>`).join('');
}

function navTo(id) {
  if (id === 'visit' && !STATE.currentPid) { navTo('patients'); toast('เลือกเคสที่ต้องการบันทึกก่อน', 'info'); return; }
  document.querySelectorAll('#app-shell .view').forEach(v => v.classList.remove('active'));
  const v = document.getElementById('view-' + id); if (v) v.classList.add('active');
  document.querySelectorAll('[data-nav]').forEach(b => b.classList.toggle('active', b.dataset.nav === id));
  document.querySelectorAll('[data-bnav]').forEach(b => b.classList.toggle('active', b.dataset.bnav === id));
  document.querySelectorAll('.nav-side').forEach(b => b.classList.toggle('bg-blue-50', b.dataset.nav === id));
  document.querySelectorAll('.nav-side').forEach(b => b.classList.toggle('text-primary', b.dataset.nav === id));
  const titles = { dashboard:'แดชบอร์ด', patients:'รายชื่อเคส', visit:'บันทึกการเยี่ยม', history:'ประวัติการเยี่ยม' };
  document.getElementById('hdr-page').textContent = titles[id] || '';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  if (id === 'dashboard') loadDashboard();
  if (id === 'patients') loadPatients();
}

function quickVisit() { if (STATE.currentPid) navTo('visit'); else { navTo('patients'); toast('เลือกเคสก่อน', 'info'); } }

/* ===================================================== */
/* APP ENTRY                                             */
/* ===================================================== */
function enterApp() {
  document.getElementById('view-login').classList.remove('active');
  document.getElementById('app-shell').classList.remove('hidden');
  document.getElementById('hdr-user').textContent = STATE.user.full_name;
  document.getElementById('hdr-role').textContent = ROLE_LABEL[STATE.user.role] || STATE.user.role;
  buildNav();
  // โหลด master data ที่ใช้ร่วม
  api('getCareGivers').then(r => { if (r.success) STATE.careGivers = r.data.careGivers; });
  navTo('dashboard');
}

/* ===================================================== */
/* UTILITY HELPERS                                       */
/* ===================================================== */
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg, icon='success'){
  Swal.fire({ toast:true, position:'top', timer:2200, showConfirmButton:false, icon, title: msg });
}
function loadingFire(title='กำลังบันทึก...'){ Swal.fire({ title, allowOutsideClick:false, didOpen:()=>Swal.showLoading() }); }
function num(v){ const n=parseFloat(v); return isNaN(n)?0:n; }
function digits(s){ return String(s||'').replace(/[^\d]/g,''); }
function toBE(ymd){ if(!ymd) return ''; const p=String(ymd).split('-'); if(p.length<3) return ymd; return p[2]+'/'+p[1]+'/'+(parseInt(p[0],10)+543); }
function riskBadge(r){
  const map={normal:['ปกติ','risk-normal'],low:['เสี่ยงน้อย','risk-low'],moderate:['เสี่ยงปานกลาง','risk-moderate'],high:['เสี่ยงสูง','risk-high']};
  const m=map[r]||map.normal; return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${m[1]}">${m[0]}</span>`;
}
function skel(h='h-24'){ return `<div class="skeleton ${h} w-full mb-3"></div>`; }

/* auto-login ถ้ามี token ใน session */
window.addEventListener('DOMContentLoaded', () => { if (STATE.token && STATE.user) enterApp(); });

/* ===================================================== */
/* DASHBOARD                                             */
/* ===================================================== */
async function loadDashboard() {
  const el = $('view-dashboard');
  el.innerHTML = `<div class="grid grid-cols-2 lg:grid-cols-3 gap-3">${skel('h-24').repeat(6)}</div>`;
  const r = await api('getDashboard');
  if (!r.success) { el.innerHTML = emptyState('โหลดข้อมูลไม่สำเร็จ', r.message); return; }
  const c = r.data.cards;

  const cards = [
    ['ผู้สูงอายุทั้งหมด', c.totalPatients, 'fa-users', 'text-primary bg-blue-50'],
    ['Care Giver', c.totalCareGivers, 'fa-user-nurse', 'text-secondary bg-emerald-50'],
    ['เยี่ยมวันนี้', c.visitsToday, 'fa-calendar-day', 'text-primary bg-blue-50'],
    ['เยี่ยมเดือนนี้', c.visitsThisMonth, 'fa-calendar-week', 'text-secondary bg-emerald-50'],
    ['ติดเตียง (ADL 0-4)', c.adl04, 'fa-bed', 'text-danger bg-red-50'],
    ['9Q ≥ 7', c.nineqHigh, 'fa-brain', 'text-warning bg-amber-50'],
    ['8Q > 0', c.eightqPositive, 'fa-triangle-exclamation', 'text-danger bg-red-50'],
    ['มีพิกัด', c.withLocation, 'fa-location-dot', 'text-primary bg-blue-50'],
    ['มีภาพกิจกรรม', c.withPhoto, 'fa-images', 'text-secondary bg-emerald-50']
  ];

  el.innerHTML = `
    <div class="grid grid-cols-2 lg:grid-cols-3 gap-3 mb-4">
      ${cards.map(c => `
        <div class="card p-4">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-xs text-slate-400">${c[0]}</p>
              <p class="text-2xl font-bold mt-1">${c[1]}</p>
            </div>
            <div class="w-10 h-10 rounded-xl flex items-center justify-center ${c[3]}"><i class="fa-solid ${c[2]}"></i></div>
          </div>
        </div>`).join('')}
    </div>
    <div class="grid lg:grid-cols-3 gap-3">
      <div class="card p-4 lg:col-span-3"><p class="font-semibold mb-2 text-sm">จำนวนการเยี่ยมรายเดือน</p><canvas id="chartMonthly" height="120"></canvas></div>
      <div class="card p-4"><p class="font-semibold mb-2 text-sm">เคสตามระดับ ADL</p><canvas id="chartAdl"></canvas></div>
      <div class="card p-4 lg:col-span-2"><p class="font-semibold mb-2 text-sm">ระดับความเสี่ยงสุขภาพจิต</p><canvas id="chartRisk"></canvas></div>
    </div>`;

  drawChart('chartMonthly', 'bar', r.data.monthly.labels, [{ label:'ครั้ง', data:r.data.monthly.data, backgroundColor:'#2563EB', borderRadius:6 }]);
  drawChart('chartAdl', 'doughnut', r.data.adl.labels, [{ data:r.data.adl.data, backgroundColor:['#EF4444','#F59E0B','#10B981'] }]);
  drawChart('chartRisk', 'bar', r.data.risk.labels, [{ label:'เคส', data:r.data.risk.data, backgroundColor:['#10B981','#F59E0B','#F97316','#EF4444'], borderRadius:6 }]);
}

function drawChart(id, type, labels, datasets) {
  const ctx = $(id); if (!ctx) return;
  if (STATE.charts[id]) STATE.charts[id].destroy();
  STATE.charts[id] = new Chart(ctx, {
    type, data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: type === 'bar',
      plugins: { legend: { display: type !== 'bar', position: 'bottom', labels:{ font:{family:'Noto Sans Thai'} } } },
      scales: type === 'bar' ? { y: { beginAtZero: true, ticks:{ precision:0 } } } : {}
    }
  });
}

/* ===================================================== */
/* PATIENT LIST                                          */
/* ===================================================== */
async function loadPatients() {
  const el = $('view-patients');
  el.innerHTML = skel('h-12') + skel('h-24').repeat(4);
  const r = await api('getPatients');
  if (!r.success) { el.innerHTML = emptyState('โหลดข้อมูลไม่สำเร็จ', r.message); return; }
  STATE.patients = r.data.patients;

  el.innerHTML = `
    <div class="card p-3 mb-3 space-y-2">
      <div class="relative">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400"></i>
        <input id="pt-search" oninput="renderPatientList()" placeholder="ค้นหาชื่อ / PID / หมู่บ้าน"
          class="w-full pl-10 pr-3 py-2.5 rounded-xl border border-slate-200 focus:border-primary outline-none text-sm" />
      </div>
      <div class="flex gap-2 overflow-x-auto pb-1">
        <select id="pt-risk" onchange="renderPatientList()" class="text-sm border border-slate-200 rounded-lg px-2 py-1.5 shrink-0">
          <option value="">ความเสี่ยงทั้งหมด</option>
          <option value="normal">ปกติ</option><option value="low">น้อย</option>
          <option value="moderate">ปานกลาง</option><option value="high">สูง</option>

          <p class="text-xs text-slate-500 mt-1"><i class="fa-solid fa-user-nurse mr-1 text-secondary"></i>${esc(p.assigned_cg_name||'-')}</p>
          ${p.last_visit_date ? `<p class="text-xs text-slate-400 mt-0.5">เยี่ยมล่าสุด ${esc(toBE(p.last_visit_date))} • ${esc(p.last_adl_result||'')}</p>` : '<p class="text-xs text-slate-300 mt-0.5">ยังไม่มีการเยี่ยม</p>'}

}

function sec1Body(){
  return `<div class="grid grid-cols-2 gap-3">

      <input id="f-weight" type="number" step="0.1" inputmode="decimal" oninput="calcBMI()" class="w-full mt-1 border border-slate-200 rounded-lg px-2 py-2"></div>
    <div><label class="text-xs text-slate-400">ส่วนสูง (ซม.)</label>
      <input id="f-height" type="number" step="0.1" inputmode="decimal" oninput="calcBMI()" class="w-full mt-1 border border-slate-200 rounded-lg px-2 py-2"></div>
  </div>
  <div id="bmi-box" class="hidden mt-3 p-3 rounded-xl bg-blue-50 text-center">
    <p class="text-xs text-slate-500">ค่า BMI</p>
    <p class="text-2xl font-bold text-primary" id="bmi-val">-</p>
    <p class="text-sm font-medium" id="bmi-res">-</p>
  </div>`;
}
function calcBMI(){
  const w=num($('f-weight').value), h=num($('f-height').value);
  const box=$('bmi-box');
  if(!w||!h){ box.classList.add('hidden'); VISIT.bmi=''; return; }
  const m=h/100, bmi=Math.round(w/(m*m)*10)/10;
  let res,color;
  if(bmi<18.5){res='น้ำหนักน้อย/ผอม';color='text-warning';}
  else if(bmi<23){res='ปกติ';color='text-secondary';}
  else if(bmi<25){res='น้ำหนักเกิน';color='text-warning';}
  else if(bmi<30){res='อ้วนระดับ 1';color='text-danger';}
  else {res='อ้วนระดับ 2';color='text-danger';}
  box.classList.remove('hidden'); $('bmi-val').textContent=bmi;
  const r=$('bmi-res'); r.textContent=res; r.className='text-sm font-medium '+color;
  VISIT.bmi=bmi;
}

function segGroup(name, opts, onchange){
  const cols = opts.length<=2?'grid-cols-2':opts.length===3?'grid-cols-3':'grid-cols-2';
  return `<div class="seg grid ${cols} gap-2 mt-2">
    ${opts.map(o=>`<label><input type="radio" name="${name}" value="${o[0]}" onchange="${onchange}"><span>${esc(String(o[1]))} <b>(${o[0]})</b></span></label>`).join('')}
  </div>`;
}

function sec3Body(){
  return ADL_ITEMS.map((it,i)=>`<div class="mb-3 pb-3 ${i<9?'border-b border-slate-100':''}">
    <p class="text-sm font-medium">${esc(it.q)}</p>
    ${segGroup('adl_'+(i+1), it.o, 'calcADL()')}
  </div>`).join('') +
  `<div id="adl-box" class="hidden mt-1 p-3 rounded-xl bg-emerald-50 text-center">
    <p class="text-xs text-slate-500">คะแนน ADL รวม (เต็ม 20)</p>
    <p class="text-2xl font-bold text-secondary" id="adl-val">0</p>
    <p class="text-sm font-medium" id="adl-res">-</p></div>`;
}
function calcADL(){
  let total=0, answered=0;
  for(let i=1;i<=10;i++){ const r=document.querySelector(`input[name="adl_${i}"]:checked`); if(r){total+=num(r.value);answered++;} }
  let res,color;
  if(total<=4){res='ภาวะพึ่งพิงมาก/ติดเตียง';color='text-danger';}
  else if(total<=11){res='ภาวะพึ่งพิงปานกลาง/ติดบ้าน';color='text-warning';}
  else {res='ช่วยเหลือตนเองได้/ติดสังคม';color='text-secondary';}
  $('adl-box').classList.toggle('hidden', answered===0);
  $('adl-val').textContent=total; const r=$('adl-res'); r.textContent=res; r.className='text-sm font-medium '+color;

function calcMental(){
  const v=n=>{const r=document.querySelector(`input[name="${n}"]:checked`);return r?r.value:null;};
  const q2_1=num(v('q2_1')), q2_2=num(v('q2_2'));
  const positive=(q2_1>0||q2_2>0);
  $('q9-wrap').classList.toggle('hidden', !positive);

  let q9total=0, q9_9=0, q9res='', q8total='', q8res='', risk='normal';
  if(positive){
    for(let i=1;i<=9;i++){ const x=v('q9_'+i); if(x!==null) q9total+=num(x); }
    q9_9=num(v('q9_9'));
    if(q9total<=6)q9res='ไม่มีภาวะซึมเศร้า'; else if(q9total<=12)q9res='ซึมเศร้าระดับน้อย';
    else if(q9total<=18)q9res='ซึมเศร้าระดับปานกลาง'; else q9res='ซึมเศร้าระดับรุนแรง';
    $('q9-val').textContent=q9total; $('q9-res').textContent=q9res;
  }
  // 8Q เฉพาะเมื่อ 9Q>=7
  const show8 = positive && q9total>=7;
  $('q8-wrap').classList.toggle('hidden', !show8);
  if(show8){
    const w=[1,2,6,8,9,4,10,4]; q8total=0;
    for(let i=1;i<=8;i++){ if(num(v('q8_'+i))>0) q8total+=w[i-1]; }
    // โชว์ช่องควบคุมถ้าข้อ 3 = มี
    $('q8-control').classList.toggle('hidden', num(v('q8_3'))===0);
    const ctrl=v('q8_ctrl');
    if(q8total===0)q8res='ไม่มีแนวโน้มฆ่าตัวตาย'; else if(q8total<=8)q8res='แนวโน้มระดับน้อย';
    else if(q8total<=16)q8res='แนวโน้มระดับกลาง'; else q8res='แนวโน้มระดับรุนแรง';
    $('q8-val').textContent=q8total; $('q8-res').textContent=q8res;
    if(q8total>=17||ctrl==='ไม่ได้')risk='high'; else if(q8total>=9)risk='moderate'; else if(q8total>=1)risk='low';
  }
  if(risk==='normal' && q9_9>0) risk='low';

  // เตือนทันทีถ้า 9Q ข้อ 9 > 0
  if(q9_9>0 && !VISIT._alerted9){ VISIT._alerted9=true;
    Swal.fire({icon:'warning',title:'พบสัญญาณเสี่ยง',html:'ผู้สูงอายุมีความคิดทำร้ายตนเอง<br>กรุณาประเมิน 8Q และแจ้งเจ้าหน้าที่',confirmButtonColor:'#F59E0B'});
  }
  if(q9_9===0) VISIT._alerted9=false;

  VISIT.q2_1=q2_1; VISIT.q2_2=q2_2; VISIT.q9total=positive?q9total:''; VISIT.q9res=q9res;
  VISIT.q8total=q8total; VISIT.q8res=q8res; VISIT.risk=risk; VISIT.mentalActive=positive;
}

function getLocation(){
  if(!navigator.geolocation){ toast('อุปกรณ์ไม่รองรับ Geolocation','error'); return; }
  loadingFire('กำลังดึงพิกัด...');
  navigator.geolocation.getCurrentPosition(pos=>{
    Swal.close();
    const lat=+pos.coords.latitude.toFixed(6), lng=+pos.coords.longitude.toFixed(6);
    VISIT.lat=lat; VISIT.lng=lng; $('f-lat').value=lat; $('f-lng').value=lng;
    renderVisitMap(lat,lng);
    toast('บันทึกพิกัดแล้ว','success');
  }, err=>{ Swal.close(); Swal.fire({icon:'error',title:'ดึงพิกัดไม่สำเร็จ',text:'กรุณาอนุญาตการเข้าถึงตำแหน่ง',confirmButtonColor:'#2563EB'}); },
  { enableHighAccuracy:true, timeout:10000 });
}
function renderVisitMap(lat,lng){
  setTimeout(()=>{
    if(STATE.maps.visit){ STATE.maps.visit.remove(); }
    const m=L.map('visit-map').setView([lat,lng],16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(m);
    const marker=L.marker([lat,lng],{draggable:true}).addTo(m);
    marker.on('dragend',e=>{const p=e.target.getLatLng();VISIT.lat=+p.lat.toFixed(6);VISIT.lng=+p.lng.toFixed(6);$('f-lat').value=VISIT.lat;$('f-lng').value=VISIT.lng;});
    STATE.maps.visit=m;
  },150);
}

async function saveVisit(){
  // ---- header validation ----
  if(!$('f-date').value){ toast('กรุณาเลือกวันที่เยี่ยม','warning'); return; }
  if(!$('f-tstart').value){ toast('กรุณาเลือกเวลาเริ่ม','warning'); return; }
  if(!$('f-tend').value){ toast('กรุณาเลือกเวลาสิ้นสุด','warning'); return; }
  if($('f-tend').value <= $('f-tstart').value){ toast('เวลาสิ้นสุดต้องมากกว่าเวลาเริ่ม','warning'); return; }
  const phone=$('f-cgphone').value;
  if(phone && !/^\d{9,10}$/.test(phone)){ toast('เบอร์ติดต่อไม่ถูกต้อง','warning'); return; }

  // ---- section validation (ถ้าเปิด toggle ต้องกรอกครบ) ----
  if($('tg-adl').checked && (VISIT.adl_answered||0) < 10){ toast('เปิด ADL แล้วต้องตอบครบ 10 ข้อ','warning'); toggleAccOpen('adl'); return; }
  if($('tg-mental').checked){
    if(document.querySelector('input[name="q2_1"]:checked')===null || document.querySelector('input[name="q2_2"]:checked')===null){
      toast('กรุณาตอบ 2Q ให้ครบ','warning'); toggleAccOpen('mental'); return; }
  }

  // เก็บค่าสุดท้าย
  if($('tg-adl').checked) calcADL();
  if($('tg-mental').checked) calcMental();

  const data = {
    pid: VISIT.pid,
    visit_date: $('f-date').value,
    visit_time_start: $('f-tstart').value,
    visit_time_end: $('f-tend').value,
    caregiver_name: $('f-cgname').value,
    caregiver_relation: $('f-rel').value,
    caregiver_phone: phone,
    weight: $('f-weight').value, height: $('f-height').value,
    temp: $('f-temp').value, pulse: $('f-pulse').value,
    respiration: $('f-resp').value, blood_pressure: $('f-bp').value,
    daily_care: collectCheck('daily'),
    health_care: collectCheck('health'),
    other_care: collectCheck('other'),
    note: $('f-note').value,
    photos: VISIT.photos,
    latitude: VISIT.lat, longitude: VISIT.lng
  };

  if($('tg-adl').checked){
    data.adl={}; for(let i=1;i<=10;i++){const r=document.querySelector(`input[name="adl_${i}"]:checked`);data.adl['adl_'+i]=r?r.value:0;}
  }
  if($('tg-mental').checked){
    const v=n=>{const r=document.querySelector(`input[name="${n}"]:checked`);return r?r.value:0;};
    data.mental={
      q2:{q2_1:v('q2_1'),q2_2:v('q2_2')},
      q9:{}, q8:{}, q8_control_selfharm: (document.querySelector('input[name="q8_ctrl"]:checked')||{}).value||''
    };
    for(let i=1;i<=9;i++)data.mental.q9['q9_'+i]=v('q9_'+i);
    for(let i=1;i<=8;i++)data.mental.q8['q8_'+i]=v('q8_'+i);
  }

  loadingFire('กำลังบันทึกการเยี่ยม...');
  try{
    const r=await api('saveVisit', data);
    Swal.close();
    if(!r.success){ Swal.fire({icon:'error',title:'บันทึกไม่สำเร็จ',text:r.message,confirmButtonColor:'#EF4444'}); return; }
    // แจ้งเตือนความเสี่ยงสุขภาพจิต
    const risk=r.data.mental?r.data.mental.risk_level:'normal';
    if(['low','moderate','high'].includes(risk)){
      await Swal.fire({icon:'warning',iconColor:risk==='high'?'#EF4444':'#F59E0B',
        title:'พบความเสี่ยงด้านสุขภาพจิต',
        html:'กรุณาแจ้งเจ้าหน้าที่รับผิดชอบหรือ Case Manager ทันที',
        confirmButtonColor:risk==='high'?'#EF4444':'#F59E0B'});
    }
    await Swal.fire({icon:'success',title:'บันทึกสำเร็จ',text:`บันทึกการเยี่ยมครั้งที่ ${r.data.visit_no} แล้ว`,confirmButtonColor:'#2563EB'});
    STATE.currentPid=null;
    openPatientHistory(data.pid);
  }catch(e){ Swal.close(); Swal.fire({icon:'error',title:'เชื่อมต่อไม่สำเร็จ',text:e.message,confirmButtonColor:'#EF4444'}); }
}

function drawTrend(id,labels,data,color){
  const ctx=$(id); if(!ctx)return;
  if(STATE.charts[id])STATE.charts[id].destroy();
  STATE.charts[id]=new Chart(ctx,{type:'line',
    data:{labels,datasets:[{data,borderColor:color,backgroundColor:color+'22',fill:true,tension:.3,spanGaps:true,pointRadius:3}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
}

function renderTimeline(){
  const wrap=$('timeline');
  if(!STATE.histTimeline.length){ wrap.innerHTML=emptyState('ยังไม่มีการเยี่ยม',''); return; }
  wrap.innerHTML=STATE.histTimeline.map(v=>{
    const tags=[...v.daily_care,...v.health_care,...v.other_care].slice(0,4);
    return `<div class="card p-4">
      <div class="flex items-center justify-between mb-1">
        <p class="font-semibold text-sm">ครั้งที่ ${v.visit_no} • ${esc(v.buddhist_date||toBE(v.visit_date))}</p>${riskBadge(v.risk_level||'normal')}</div>
      <p class="text-xs text-slate-400">${esc(v.time_start||'')}-${esc(v.time_end||'')} • ผู้เยี่ยม ${esc(v.visitor_name)}</p>
      <div class="flex flex-wrap gap-1.5 mt-2 text-xs">
        <span class="px-2 py-0.5 rounded bg-emerald-50 text-secondary">ADL ${v.adl_total||'-'} ${esc(v.adl_result||'')}</span>
        <span class="px-2 py-0.5 rounded bg-blue-50 text-primary">BMI ${v.bmi||'-'}</span>
        <span class="px-2 py-0.5 rounded bg-amber-50 text-warning">9Q ${v.nineq_total||'-'}</span>
        <span class="px-2 py-0.5 rounded bg-red-50 text-danger">8Q ${v.eightq_total||'-'}</span>
      </div>
      ${tags.length?`<div class="flex flex-wrap gap-1 mt-2">${tags.map(t=>`<span class="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded">${esc(t)}</span>`).join('')}</div>`:''}
      ${v.photo_urls.length?`<div class="flex gap-1 mt-2">${v.photo_urls.slice(0,4).map(u=>`<img src="${esc(u)}" class="w-12 h-12 rounded object-cover" onerror="this.style.display='none'">`).join('')}</div>`:''}
      <div class="flex gap-2 mt-3 text-xs">
        <button onclick="showVisitDetail('${v.visit_id}')" class="btn-press flex-1 bg-primary text-white py-1.5 rounded-lg">ดูรายละเอียด</button>
        ${v.has_location?`<a href="${esc(v.map_link)}" target="_blank" class="btn-press bg-slate-100 text-slate-600 py-1.5 px-3 rounded-lg"><i class="fa-solid fa-map-location-dot"></i></a>`:''}
      </div>
    </div>`;
  }).join('');
}

async function loadGallery(pid){
  const r=await api('getPatientGallery',{pid});
  STATE.gallery = r.success?r.data.files:[];
  const months=[...new Set(STATE.gallery.map(f=>f.month).filter(Boolean))];
  const sel=$('gal-filter'); if(sel) sel.innerHTML='<option value="">ทั้งหมด</option>'+months.map(m=>`<option value="${m}">${m}</option>`).join('');
  renderGallery();
}
function renderGallery(){
  const f=$('gal-filter')?.value||'';
  const list=STATE.gallery.filter(g=>!f||g.month===f);
  const grid=$('gal-grid'); if(!grid)return;
  if(!list.length){ grid.innerHTML='<p class="col-span-4 text-center text-xs text-slate-400 py-4">ยังไม่มีภาพกิจกรรม</p>'; return; }
  grid.innerHTML=list.map(g=>`<img src="${esc(g.thumbnail_url)}" onclick="Swal.fire({imageUrl:'${esc(g.file_url)}',imageAlt:'ครั้งที่ ${g.visit_no}',showConfirmButton:false})" class="aspect-square w-full object-cover rounded-lg cursor-pointer btn-press" onerror="this.src='${esc(g.file_url)}'">`).join('');
}

async function loadHistMap(pid){
  const r=await api('getPatientMapHistory',{pid});
  const pts=r.success?r.data.points:[];
  setTimeout(()=>{
    if(STATE.maps.hist)STATE.maps.hist.remove();
    if(!pts.length){ $('hist-map').innerHTML='<div class="h-full flex items-center justify-center text-slate-400 text-sm">ยังไม่มีข้อมูลพิกัดการเยี่ยม</div>'; return; }
    const m=L.map('hist-map').setView([pts[0].latitude,pts[0].longitude],14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(m);
    const group=[];
    pts.forEach(pt=>{
      const mk=L.marker([pt.latitude,pt.longitude]).addTo(m);
      mk.bindPopup(`<b>ครั้งที่ ${pt.visit_no}</b><br>${esc(pt.visit_date)} ${esc(pt.time||'')}<br>ผู้เยี่ยม ${esc(pt.visitor)}<br>ADL ${pt.adl||'-'} • 9Q ${pt.nineq||'-'} • 8Q ${pt.eightq||'-'}`);
      group.push([pt.latitude,pt.longitude]);
    });
    if(group.length>1) m.fitBounds(group,{padding:[30,30]});
    STATE.maps.hist=m;
  },200);
}

/* VISIT DETAIL MODAL (tabbed)                           */
/* ===================================================== */
async function showVisitDetail(visitId){
  loadingFire('กำลังโหลด...');
  const r=await api('getVisitDetail',{visit_id:visitId});
  Swal.close();
  if(!r.success){ toast(r.message,'error'); return; }
  const v=r.data.visit, adl=r.data.adl, mn=r.data.mental, files=r.data.files;
  const tabs=['ทั่วไป','สุขภาพกาย','ADL','สุขภาพจิต','กิจกรรม','ภาพ/พิกัด'];

  const tabContent=[
    `<p><b>ครั้งที่:</b> ${v.visit_no}</p><p><b>วันที่:</b> ${esc(v.buddhist_date||v.visit_date)}</p>
     <p><b>เวลา:</b> ${esc(v.visit_time_start||'')}-${esc(v.visit_time_end||'')}</p><p><b>ผู้เยี่ยม:</b> ${esc(v.visitor_name)}</p>
     <p><b>ผู้ดูแล:</b> ${esc(v.caregiver_name)} (${esc(v.caregiver_relation)}) ${esc(v.caregiver_phone)}</p><p><b>หมายเหตุ:</b> ${esc(v.note||'-')}</p>`,
    `<p><b>น้ำหนัก:</b> ${esc(v.weight||'-')} กก. <b>ส่วนสูง:</b> ${esc(v.height||'-')} ซม.</p>
     <p><b>BMI:</b> ${esc(v.bmi||'-')} (${esc(v.bmi_result||'-')})</p>
     <p><b>อุณหภูมิ:</b> ${esc(v.temp||'-')} <b>ชีพจร:</b> ${esc(v.pulse||'-')}</p>
     <p><b>หายใจ:</b> ${esc(v.respiration||'-')} <b>ความดัน:</b> ${esc(v.blood_pressure||'-')}</p>`,
    adl.visit_id?`${ADL_ITEMS.map((it,i)=>`<p><b>ข้อ ${i+1}:</b> ${adl['adl_'+(i+1)]} คะแนน</p>`).join('')}<p class="mt-1 font-semibold text-secondary">รวม ${adl.adl_total} (${esc(v.adl_result||'')})</p>`:'<p class="text-slate-400">ไม่ได้ประเมิน ADL</p>',
    mn.visit_id?`<p><b>2Q:</b> ${esc(mn.q2_result)}</p><p><b>9Q รวม:</b> ${mn.q9_total} (${esc(mn.q9_result||'-')})</p>
       <p><b>8Q รวม:</b> ${mn.q8_total} (${esc(mn.q8_result||'-')})</p><p><b>ควบคุมตนเอง:</b> ${esc(mn.q8_control_selfharm||'-')}</p>
       <p><b>ระดับความเสี่ยง:</b> ${esc(mn.risk_level)}</p>`:'<p class="text-slate-400">ไม่ได้ประเมินสุขภาพจิต</p>',
    `<p class="font-medium">ประจำวัน:</p>${listOrDash(v.daily_care)}<p class="font-medium mt-1">สุขภาพพื้นฐาน:</p>${listOrDash(v.health_care)}<p class="font-medium mt-1">อื่น ๆ:</p>${listOrDash(v.other_care)}`,
    `${files.length?`<div class="grid grid-cols-3 gap-2 mb-2">${files.map(f=>`<img src="${esc(f.thumbnail_url||f.file_url)}" class="aspect-square object-cover rounded">`).join('')}</div>`:'<p class="text-slate-400">ไม่มีภาพ</p>'}
     ${v.map_link?`<a href="${esc(v.map_link)}" target="_blank" class="text-primary text-sm"><i class="fa-solid fa-map-location-dot mr-1"></i>เปิดแผนที่พิกัด</a>`:'<p class="text-slate-400 text-sm">ไม่มีพิกัด</p>'}`
  ];

  Swal.fire({
    width:'92%', showConfirmButton:false, showCloseButton:true,
    html:`<div class="text-left">
      <p class="font-bold text-primary mb-2">รายละเอียดการเยี่ยมครั้งที่ ${v.visit_no}</p>
      <div class="flex gap-1 overflow-x-auto pb-2 mb-2 border-b">${tabs.map((t,i)=>`<button onclick="switchTab(${i})" data-tab="${i}" class="vd-tab whitespace-nowrap text-xs px-3 py-1.5 rounded-lg ${i===0?'bg-primary text-white':'bg-slate-100 text-slate-500'}">${t}</button>`).join('')}</div>
      ${tabContent.map((c,i)=>`<div class="vd-content text-sm space-y-1 ${i===0?'':'hidden'}" data-tabc="${i}">${c}</div>`).join('')}
    </div>`
  });
}
function switchTab(i){
  document.querySelectorAll('.vd-tab').forEach(t=>{const on=+t.dataset.tab===i;t.className='vd-tab whitespace-nowrap text-xs px-3 py-1.5 rounded-lg '+(on?'bg-primary text-white':'bg-slate-100 text-slate-500');});
  document.querySelectorAll('.vd-content').forEach(c=>c.classList.toggle('hidden',+c.dataset.tabc!==i));
}
function listOrDash(arr){ return (arr&&arr.length)?`<ul class="list-disc pl-5">${arr.map(a=>`<li>${esc(a)}</li>`).join('')}</ul>`:'<p class="text-slate-400 text-sm">-</p>'; }

/* EXPORT                                                */
/* ===================================================== */
async function exportReport(type){
  loadingFire('กำลังสร้างรายงาน...');
  const action = type==='pdf'?'exportPatientReportPDF':'exportPatientReportExcel';
  const r=await api(action,{pid:STATE.currentPid});
  Swal.close();
  if(!r.success){ Swal.fire({icon:'error',title:'สร้างรายงานไม่สำเร็จ',text:r.message,confirmButtonColor:'#EF4444'}); return; }
  Swal.fire({icon:'success',title:'สร้างรายงานสำเร็จ',
    html:`<a href="${esc(r.data.url)}" target="_blank" class="text-primary underline">ดาวน์โหลดไฟล์ ${type.toUpperCase()}</a>`,
    confirmButtonColor:'#2563EB'});
}
